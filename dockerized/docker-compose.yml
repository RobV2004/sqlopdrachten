services: 
  mariadb:
    image: mariadb
    volumes:
      - mariadb_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: cisco
    ports:
      - 3306:3306
    networks:
      - phpLocalNetwork
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    links:
      - mariadb:db
    ports:
     - 8080:80
    networks:
      - phpLocalNetwork
networks:
  phpLocalNetwork: 
volumes:
    mariadb_data:
